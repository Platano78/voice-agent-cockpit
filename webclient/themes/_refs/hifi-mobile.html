<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>HI-FI VOICE PRO | Analog Assistant</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&amp;family=Inter:wght@400;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        
        /* Machined Metal Texture */
        .brushed-metal {
            background: linear-gradient(135deg, #2a2a2a 0%, #131313 100%);
            position: relative;
            overflow: hidden;
        }
        .brushed-metal::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: repeating-linear-gradient(0deg, rgba(255,255,255,0.03) 0px, rgba(255,255,255,0.03) 1px, transparent 1px, transparent 2px);
            pointer-events: none;
        }

        /* Skeuomorphic Depth */
        .panel-inset {
            box-shadow: inset 2px 2px 5px rgba(0,0,0,0.8), inset -1px -1px 2px rgba(255,255,255,0.1);
        }
        .knob-shadow {
            box-shadow: 0 10px 20px rgba(0,0,0,0.6), 0 2px 4px rgba(0,0,0,0.4);
        }
        .glow-orange {
            box-shadow: 0 0 15px #ea6b1e, 0 0 5px #ea6b1e;
        }
        .glow-cream {
            box-shadow: 0 0 12px #fffdd0, 0 0 4px #fffdd0;
        }

        /* Needle Animation */
        @keyframes needle-flutter {
            0% { transform: rotate(-45deg); }
            20% { transform: rotate(-10deg); }
            40% { transform: rotate(-30deg); }
            60% { transform: rotate(5deg); }
            80% { transform: rotate(-15deg); }
            100% { transform: rotate(-45deg); }
        }
        .needle-move {
            animation: needle-flutter 2s infinite ease-in-out;
            transform-origin: bottom center;
        }

        /* Pulse Animation */
        @keyframes pulse-ring {
            0% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.05); opacity: 0.8; }
            100% { transform: scale(1); opacity: 0.5; }
        }
        .active-pulse {
            animation: pulse-ring 2s infinite ease-in-out;
        }

        /* LCD Scanlines */
        .lcd-screen::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.02));
            z-index: 2;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-variant": "#353535",
                        "on-primary-container": "#4d4e4f",
                        "surface-tint": "#c6c6c6",
                        "surface-container-lowest": "#0e0e0e",
                        "surface-bright": "#393939",
                        "on-error": "#690005",
                        "surface-dim": "#131313",
                        "surface": "#131313",
                        "error": "#ffb4ab",
                        "outline-variant": "#444748",
                        "primary-container": "#c0c0c0",
                        "secondary-fixed-dim": "#ffb693",
                        "primary-fixed": "#e3e2e2",
                        "inverse-surface": "#e4e2e1",
                        "on-secondary-fixed-variant": "#7a3000",
                        "surface-container-low": "#1b1c1c",
                        "surface-container-highest": "#353535",
                        "on-secondary-container": "#4b1b00",
                        "on-tertiary-fixed-variant": "#484828",
                        "on-secondary-fixed": "#351000",
                        "on-error-container": "#ffdad6",
                        "on-tertiary-container": "#50502f",
                        "on-primary-fixed": "#1a1c1c",
                        "secondary-fixed": "#ffdbcc",
                        "on-primary-fixed-variant": "#464747",
                        "secondary": "#ffb693",
                        "surface-container": "#1f2020",
                        "on-secondary": "#562000",
                        "on-background": "#e4e2e1",
                        "tertiary-container": "#c3c299",
                        "on-surface-variant": "#c4c7c7",
                        "tertiary": "#e0deb3",
                        "background": "#131313",
                        "primary-fixed-dim": "#c6c6c6",
                        "tertiary-fixed": "#e6e5b9",
                        "inverse-primary": "#5d5e5f",
                        "on-surface": "#e4e2e1",
                        "outline": "#8e9192",
                        "on-primary": "#2f3131",
                        "on-tertiary-fixed": "#1d1d03",
                        "inverse-on-surface": "#303030",
                        "primary": "#dcdcdc",
                        "tertiary-fixed-dim": "#cac99f",
                        "on-tertiary": "#323214",
                        "secondary-container": "#ea6b1e",
                        "surface-container-high": "#2a2a2a",
                        "error-container": "#93000a"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "component-gap": "24px",
                        "panel-padding": "40px",
                        "stack-tight": "4px",
                        "unit": "8px"
                    },
                    "fontFamily": {
                        "body-md": ["Inter"],
                        "display-md": ["Space Mono"],
                        "display-lg": ["Space Mono"],
                        "label-caps": ["Inter"],
                        "technical-sm": ["Space Mono"]
                    },
                    "fontSize": {
                        "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "display-md": ["32px", {"lineHeight": "1.2", "letterSpacing": "1px", "fontWeight": "700"}],
                        "display-lg": ["48px", {"lineHeight": "1.2", "letterSpacing": "2px", "fontWeight": "700"}],
                        "label-caps": ["12px", {"lineHeight": "16px", "letterSpacing": "0.1em", "fontWeight": "700"}],
                        "technical-sm": ["14px", {"lineHeight": "20px", "fontWeight": "400"}]
                    }
                }
            }
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface font-body-md selection:bg-secondary-container/30">
<!-- TOP APP BAR -->
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-panel-padding h-16 border-b border-outline-variant bg-gradient-to-br from-surface-bright to-surface-dim shadow-[inset_0_1px_0_rgba(255,255,255,0.1)]">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary" data-icon="settings_voice">settings_voice</span>
<h1 class="font-display-md text-display-md text-primary tracking-widest">HI-FI VOICE PRO</h1>
</div>
<button class="hover:opacity-80 transition-opacity active:translate-y-px duration-75">
<span class="material-symbols-outlined text-primary text-[28px]" data-icon="settings">settings</span>
</button>
</header>
<!-- MAIN CHASSIS -->
<main class="min-h-screen pt-24 pb-32 px-6 md:px-panel-padding flex flex-col items-center justify-center brushed-metal">
<!-- THE "RACK" CONTAINER -->
<div class="w-full max-w-2xl bg-surface-container-high rounded-xl border-4 border-surface-variant p-8 relative shadow-2xl">
<!-- Etched screws -->
<div class="absolute top-4 left-4 w-3 h-3 rounded-full bg-surface-variant shadow-inner border border-black/20"></div>
<div class="absolute top-4 right-4 w-3 h-3 rounded-full bg-surface-variant shadow-inner border border-black/20"></div>
<div class="absolute bottom-4 left-4 w-3 h-3 rounded-full bg-surface-variant shadow-inner border border-black/20"></div>
<div class="absolute bottom-4 right-4 w-3 h-3 rounded-full bg-surface-variant shadow-inner border border-black/20"></div>
<!-- VU METER PANEL -->
<div class="mb-12 flex flex-col items-center">
<div class="relative w-64 h-32 bg-[#fffdd0] rounded-t-full border-4 border-surface-variant panel-inset overflow-hidden flex flex-col items-center justify-end pb-2">
<!-- VU Scale -->
<div class="absolute inset-0 flex items-end justify-center pointer-events-none">
<div class="w-full h-full border-b border-black/20 flex items-end justify-between px-6 pb-4">
<span class="text-[10px] font-bold text-black opacity-60">-20</span>
<span class="text-[10px] font-bold text-black opacity-60">-10</span>
<span class="text-[10px] font-bold text-black opacity-60">0</span>
<span class="text-[10px] font-bold text-error opacity-80">+3</span>
</div>
</div>
<!-- Needle -->
<div class="absolute bottom-2 w-1 h-28 bg-black/80 rounded-full needle-move origin-bottom shadow-sm" id="vu-needle"></div>
<div class="absolute bottom-0 w-6 h-6 rounded-full bg-surface-variant border-2 border-black/40 z-10"></div>
<!-- Glow -->
<div class="absolute inset-0 bg-[#ea6b1e]/10 mix-blend-overlay"></div>
</div>
<div class="mt-2 font-technical-sm text-technical-sm text-tertiary opacity-40 uppercase tracking-tighter">Signal Level (dB)</div>
</div>
<!-- CENTRAL KNOB (PTT) -->
<div class="relative flex flex-col items-center justify-center py-8">
<!-- Status Lamps Left -->
<div class="absolute left-0 top-1/2 -translate-y-1/2 flex flex-col gap-8">
<div class="flex flex-col items-center gap-1">
<div class="w-4 h-4 rounded-full bg-surface-container border border-black/50 transition-all duration-300" id="lamp-recording"></div>
<span class="font-label-caps text-[9px] text-tertiary/60">RECORDING</span>
</div>
</div>
<!-- MAIN PTT BUTTON (MACHINED KNOB) -->
<div class="relative group cursor-pointer" id="ptt-button">
<!-- Pulse Ring (Active State) -->
<div class="absolute inset-[-15px] rounded-full border-[6px] border-secondary-container/0 transition-all duration-500" id="glow-ring"></div>
<!-- The Knob Body -->
<div class="w-48 h-48 rounded-full bg-gradient-to-br from-primary-container to-surface-variant p-1 shadow-2xl flex items-center justify-center transition-transform active:scale-95 duration-75">
<div class="w-full h-full rounded-full bg-gradient-to-tl from-primary-container to-surface-variant flex items-center justify-center border-2 border-black/10">
<!-- Machined Texture -->
<div class="w-[90%] h-[90%] rounded-full bg-primary-container shadow-[inset_0_2px_10px_rgba(255,255,255,0.5),_inset_0_-2px_10px_rgba(0,0,0,0.3)] flex items-center justify-center relative overflow-hidden">
<div class="absolute inset-0 bg-white/5 opacity-20 pointer-events-none" style="background: repeating-conic-gradient(from 0deg, transparent 0deg 1deg, rgba(0,0,0,0.1) 2deg);"></div>
<!-- Indicator Line -->
<div class="absolute top-4 w-1.5 h-6 bg-secondary-container rounded-full transition-transform duration-500 origin-[center_88px]" id="knob-indicator"></div>
<!-- Icon/Label -->
<span class="material-symbols-outlined text-surface-dim text-6xl select-none" data-icon="mic" id="mic-icon">mic</span>
</div>
</div>
</div>
</div>
<!-- Status Lamps Right -->
<div class="absolute right-0 top-1/2 -translate-y-1/2 flex flex-col gap-8">
<div class="flex flex-col items-center gap-1">
<div class="w-4 h-4 rounded-full bg-surface-container glow-cream border border-black/50 transition-all duration-300 shadow-[0_0_8px_#fffdd0]" id="lamp-connected"></div>
<span class="font-label-caps text-[9px] text-tertiary/60">CONNECTED</span>
</div>
</div>
</div>
<!-- LCD DISPLAYS -->
<div class="mt-12 space-y-4">
<!-- User Input -->
<div class="relative w-full h-16 bg-surface-container-lowest panel-inset rounded-lg p-3 lcd-screen overflow-hidden">
<div class="flex flex-col h-full justify-center">
<span class="font-label-caps text-[10px] text-secondary opacity-30 absolute top-1 left-2">INPUT_BUFFER</span>
<p class="font-technical-sm text-secondary opacity-80 pl-2 mt-2 truncate" id="user-transcript">READY FOR VOICE INPUT...</p>
</div>
</div>
<!-- Assistant Reply -->
<div class="relative w-full h-24 bg-surface-container-lowest panel-inset rounded-lg p-3 lcd-screen overflow-hidden">
<div class="flex flex-col h-full">
<span class="font-label-caps text-[10px] text-tertiary opacity-30 absolute top-1 left-2">OUTPUT_STREAM</span>
<p class="font-technical-sm text-tertiary opacity-90 pl-2 mt-4 leading-relaxed line-clamp-3" id="assistant-response">STANDING BY FOR COMMAND. SYSTEM ONLINE.</p>
</div>
</div>
</div>
</div>
<!-- BOTTOM NAV BAR (REPLICATED FROM JSON) -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center h-20 pb-4 border-t border-outline bg-gradient-to-b from-surface-bright to-surface-dim shadow-[0_-4px_10px_rgba(0,0,0,0.5)] md:hidden">
<button class="flex flex-col items-center justify-center text-secondary scale-105 transition-transform duration-100 hover:text-primary active:scale-95">
<span class="material-symbols-outlined" data-icon="settings_voice">settings_voice</span>
<span class="font-label-caps text-label-caps">DECK</span>
</button>
<button class="flex flex-col items-center justify-center text-outline opacity-60 transition-transform duration-100 hover:text-primary active:scale-95">
<span class="material-symbols-outlined" data-icon="radio">radio</span>
<span class="font-label-caps text-label-caps">TUNER</span>
</button>
<button class="flex flex-col items-center justify-center text-outline opacity-60 transition-transform duration-100 hover:text-primary active:scale-95">
<span class="material-symbols-outlined" data-icon="history">history</span>
<span class="font-label-caps text-label-caps">HISTORY</span>
</button>
<button class="flex flex-col items-center justify-center text-outline opacity-60 transition-transform duration-100 hover:text-primary active:scale-95">
<span class="material-symbols-outlined" data-icon="analytics">analytics</span>
<span class="font-label-caps text-label-caps">SYSTEM</span>
</button>
</nav>
</main>
<script>
        const pttBtn = document.getElementById('ptt-button');
        const glowRing = document.getElementById('glow-ring');
        const micIcon = document.getElementById('mic-icon');
        const lampRec = document.getElementById('lamp-recording');
        const transcript = document.getElementById('user-transcript');
        const response = document.getElementById('assistant-response');
        const indicator = document.getElementById('knob-indicator');
        const needle = document.getElementById('vu-needle');

        let isRecording = false;

        pttBtn.addEventListener('mousedown', startListening);
        pttBtn.addEventListener('mouseup', stopListening);
        pttBtn.addEventListener('mouseleave', stopListening);
        
        // Touch events for mobile
        pttBtn.addEventListener('touchstart', (e) => { e.preventDefault(); startListening(); });
        pttBtn.addEventListener('touchend', (e) => { e.preventDefault(); stopListening(); });

        function startListening() {
            if (isRecording) return;
            isRecording = true;
            
            glowRing.classList.remove('border-secondary-container/0');
            glowRing.classList.add('border-secondary-container/50', 'glow-orange', 'active-pulse');
            lampRec.classList.add('bg-secondary-container', 'glow-orange', 'shadow-[0_0_8px_#ea6b1e]');
            micIcon.style.color = '#ea6b1e';
            indicator.style.transform = 'rotate(45deg)';
            
            transcript.innerText = "CAPTURING AUDIO STREAM...";
            response.innerText = "...";

            // Simulate VU jitter
            needle.style.animationDuration = '0.5s';
        }

        function stopListening() {
            if (!isRecording) return;
            isRecording = false;

            glowRing.classList.add('border-secondary-container/0');
            glowRing.classList.remove('border-secondary-container/50', 'glow-orange', 'active-pulse');
            lampRec.classList.remove('bg-secondary-container', 'glow-orange', 'shadow-[0_0_8px_#ea6b1e]');
            micIcon.style.color = '';
            indicator.style.transform = 'rotate(0deg)';
            
            transcript.innerText = "COMMAND RECEIVED: 'PLAY JAZZ CLASSICS'";
            needle.style.animationDuration = '2s';

            // Simulate AI delay
            setTimeout(() => {
                response.innerText = "COMMENCING PLAYBACK. TUNING ANALOG FILTERS FOR OPTIMAL FIDELITY.";
            }, 800);
        }

        // Randomly flutter the VU meter even when idle
        setInterval(() => {
            if(!isRecording) {
                const randomRot = Math.floor(Math.random() * 20) - 45;
                needle.style.transform = `rotate(${randomRot}deg)`;
            }
        }, 1500);
    </script>
</body></html>
